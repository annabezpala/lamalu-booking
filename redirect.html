<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LamaLu — Запис до фахівця</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Сплеш-екран */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #f5f7fa;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .logo { font-size: 56px; margin-bottom: 8px; }
    .clinic { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 28px; }
    .card {
      background: white; border-radius: 16px; padding: 24px 22px;
      width: min(340px, 90vw); box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }
    .svc-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .svc-name { font-size: 17px; font-weight: 600; color: #1565c0; margin-bottom: 4px; }
    .svc-spec { font-size: 13px; color: #666; margin-bottom: 18px; }
    .progress-wrap { background: #e8f4fd; border-radius: 8px; height: 6px; overflow: hidden; margin-bottom: 12px; }
    .progress-bar { height: 100%; background: #168acd; border-radius: 8px; width: 0%; transition: width 0.3s ease; }
    .status { font-size: 13px; color: #888; text-align: center; }
    .status.ok { color: #2e7d32; }

    /* iframe Lakmus */
    #lakmus-frame {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: none; display: none;
    }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo">🦙</div>
  <div class="clinic">LamaLu Clinic</div>
  <div class="card">
    <div class="svc-label">Направлення до фахівця</div>
    <div class="svc-name" id="svc-name">Завантаження...</div>
    <div class="svc-spec" id="svc-spec"></div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress"></div>
    </div>
    <div class="status" id="status">Відкриваємо форму запису...</div>
  </div>
</div>

<iframe id="lakmus-frame"
  src="https://booking.lakmus.org/?client=lamalu&defaultAppointmentType=appointment&defaultPaymentSource=inclinic"
  allow="same-origin">
</iframe>

<script>
  const SEARCH_KEY = 'lamalu_search';
  const params = new URLSearchParams(location.search);
  const search = params.get('search') || '';
  const specialist = params.get('specialist') || '';

  // Заповнюємо сплеш
  document.getElementById('svc-name').textContent = search || 'Онлайн запис';
  if (specialist) {
    document.getElementById('svc-spec').textContent = 'Фахівець: ' + specialist;
  }

  const progressEl = document.getElementById('progress');
  const statusEl = document.getElementById('status');

  function setProgress(pct) { progressEl.style.width = pct + '%'; }
  function setStatus(msg, ok) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (ok ? ' ok' : '');
  }

  // Крок 1: Записуємо search в localStorage Lakmus через прихований iframe
  function writeToStorage(callback) {
    setProgress(20);
    setStatus('Підготовка...');
    if (!search) { callback(); return; }

    const helper = document.createElement('iframe');
    helper.style.display = 'none';
    helper.src = 'https://booking.lakmus.org/';
    helper.onload = function() {
      try {
        helper.contentWindow.localStorage.setItem(SEARCH_KEY, search);
        setProgress(50);
        setStatus('Відкриваємо Lakmus...');
      } catch(e) {
        // якщо не вдалось — просто продовжуємо
      }
      document.body.removeChild(helper);
      callback();
    };
    helper.onerror = function() {
      document.body.removeChild(helper);
      callback();
    };
    document.body.appendChild(helper);
  }

  // Крок 2: inject в основний iframe Lakmus
  function injectIntoFrame(frame, query, attempt) {
    if (attempt > 80) {
      showLakmus();
      return;
    }
    try {
      const win = frame.contentWindow;
      const doc = win.document;
      if (!doc || !doc.body || doc.body.innerHTML.length < 300) {
        setTimeout(() => injectIntoFrame(frame, query, attempt + 1), 150);
        return;
      }
      const input = doc.querySelector('input[placeholder*="Пошук"]');
      if (!input) {
        setTimeout(() => injectIntoFrame(frame, query, attempt + 1), 150);
        return;
      }
      // Angular inject
      const setter = Object.getOwnPropertyDescriptor(win.HTMLInputElement.prototype, 'value').set;
      setter.call(input, query);
      input.dispatchEvent(new win.Event('input', { bubbles: true }));
      input.dispatchEvent(new win.Event('change', { bubbles: true }));
      input.dispatchEvent(new win.KeyboardEvent('keyup', { bubbles: true }));
      // Очищаємо LS
      try { win.localStorage.removeItem(SEARCH_KEY); } catch(e) {}
      setProgress(100);
      setStatus('Готово!', true);
      setTimeout(showLakmus, 400);
    } catch(e) {
      setTimeout(() => injectIntoFrame(frame, query, attempt + 1), 150);
    }
  }

  function showLakmus() {
    const splash = document.getElementById('splash');
    splash.classList.add('hidden');
    setTimeout(() => {
      splash.style.display = 'none';
      document.getElementById('lakmus-frame').style.display = 'block';
    }, 400);
  }

  // Старт
  const frame = document.getElementById('lakmus-frame');

  writeToStorage(function() {
    setProgress(60);
    setStatus('Завантажуємо...');
    // Чекаємо завантаження основного iframe і робимо inject
    frame.onload = function() {
      setProgress(80);
      if (search) {
        injectIntoFrame(frame, search, 0);
      } else {
        setProgress(100);
        setTimeout(showLakmus, 300);
      }
    };
    // Якщо iframe вже завантажився (з кешу)
    try {
      if (frame.contentDocument && frame.contentDocument.body &&
          frame.contentDocument.body.innerHTML.length > 300) {
        setProgress(80);
        if (search) injectIntoFrame(frame, search, 0);
        else { setProgress(100); setTimeout(showLakmus, 300); }
      }
    } catch(e) {}
  });
</script>
</body>
</html>
