<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LamaLu — Запис до фахівця</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:white;border-radius:20px;padding:36px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 2px 24px rgba(0,0,0,.07)}
    .logo{font-size:52px;margin-bottom:8px}
    .clinic{font-size:13px;color:#999;margin-bottom:20px;letter-spacing:.5px;text-transform:uppercase}
    .label{font-size:13px;color:#888;margin-bottom:8px}
    .service-box{background:#eef6fd;border:1.5px solid #b8daf5;border-radius:12px;padding:14px 18px;margin-bottom:10px}
    .service-name{font-size:16px;font-weight:600;color:#1565c0}
    .specialist{font-size:13px;color:#555;margin-top:4px}
    .step{display:flex;align-items:flex-start;gap:12px;text-align:left;padding:10px 0;border-bottom:1px solid #f0f0f0}
    .step:last-child{border-bottom:none}
    .step-num{width:24px;height:24px;background:#168acd;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
    .step-text{font-size:13.5px;color:#333;line-height:1.5;padding-top:2px}
    .step-text b{color:#1565c0}
    .btn{display:block;width:100%;margin-top:24px;padding:15px;background:#168acd;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
    .btn:hover{background:#1278b0}
    .auto-badge{display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;margin-bottom:16px}
    .steps-title{font-size:13px;color:#888;margin:20px 0 8px;text-align:left}
    #status-msg{font-size:13px;color:#888;margin-top:12px;min-height:20px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🦙</div>
  <div class="clinic">LamaLu Clinic</div>
  <div class="label">Направлення до фахівця</div>
  <div class="service-box">
    <div class="service-name" id="service-display">Завантаження...</div>
    <div class="specialist" id="specialist-display"></div>
  </div>
  <span class="auto-badge" id="auto-badge">✨ Автоматичний пошук</span>
  <div class="steps-title">Що відбудеться:</div>
  <div class="step"><div class="step-num">1</div><div class="step-text">Відкриється сторінка запису Lakmus</div></div>
  <div class="step"><div class="step-num">2</div><div class="step-text">Поле пошуку автоматично заповниться: <b id="search-hint">...</b></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-text">Оберіть зручний час і запишіться</div></div>
  <a id="main-btn" class="btn" href="#" onclick="handleClick(event)">📅 Відкрити запис</a>
  <div id="status-msg"></div>
</div>
<script>
  const LAKMUS_BASE='https://booking.lakmus.org/?client=lamalu&defaultAppointmentType=appointment&defaultPaymentSource=inclinic';
  const params=new URLSearchParams(window.location.search);
  const search=params.get('search')||'';
  const specialist=params.get('specialist')||'';

  document.getElementById('service-display').textContent=search||'Онлайн запис';
  document.getElementById('search-hint').textContent=search?`"${search}"`:'—';
  if(specialist) document.getElementById('specialist-display').textContent=`Фахівець: ${specialist}`;
  if(!search) document.getElementById('auto-badge').style.display='none';

  function setStatus(msg){document.getElementById('status-msg').textContent=msg}

  function fillSearch(win,query,attempt){
    if(attempt>40){setStatus('Lakmus відкрито — заповніть пошук вручну.');return}
    try{
      const doc=win.document;
      if(!doc||!doc.body||doc.body.innerHTML.length<100){setTimeout(()=>fillSearch(win,query,attempt+1),300);return}
      const input=doc.querySelector('input[placeholder*="Пошук"]');
      if(!input){setTimeout(()=>fillSearch(win,query,attempt+1),300);return}
      const setter=Object.getOwnPropertyDescriptor(win.HTMLInputElement.prototype,'value').set;
      setter.call(input,query);
      input.dispatchEvent(new win.Event('input',{bubbles:true}));
      input.dispatchEvent(new win.Event('change',{bubbles:true}));
      input.dispatchEvent(new win.KeyboardEvent('keyup',{bubbles:true}));
      setStatus('✅ Пошук заповнено автоматично!');
    }catch(e){
      setStatus(`Lakmus відкрито. Знайдіть: "${query}"`);
    }
  }

  function handleClick(e){
    e.preventDefault();
    const btn=document.getElementById('main-btn');
    btn.textContent='⏳ Відкриваємо...';
    const win=window.open(LAKMUS_BASE,'_blank');
    if(!win){btn.href=LAKMUS_BASE;btn.textContent='📅 Відкрити запис';setStatus('Дозвольте pop-up або натисніть ще раз.');return}
    btn.textContent='📅 Відкрити запис';
    if(search){setStatus('Завантажуємо Lakmus...');setTimeout(()=>fillSearch(win,search,0),800)}
    else setStatus('Lakmus відкрито!');
  }
</script>
</body>
</html>
